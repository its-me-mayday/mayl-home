---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install base dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - curl
      - git
      - sqlite3
      - ca-certificates
      - zstd
    state: present

- name: Create archiver user
  user:
    name: archiver
    shell: /bin/bash
    create_home: yes

- name: Create email archive directory
  file:
    path: /home/archiver/emails
    state: directory
    owner: archiver
    mode: '0750'
