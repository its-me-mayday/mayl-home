---
- name: Install Python dependencies
  apt:
    name:
      - python3-pip
      - python3-venv
    state: present

- name: Copy app to container
  copy:
    src: ../../../dashboard/
    dest: /home/archiver/app/
    owner: archiver
    group: archiver
    mode: '0755'

- name: Create Python virtual environment
  command: python3 -m venv /home/archiver/venv
  args:
    creates: /home/archiver/venv

- name: Install Python requirements
  pip:
    requirements: /home/archiver/app/requirements.txt
    virtualenv: /home/archiver/venv

- name: Deploy systemd service
  template:
    src: dashboard.service.j2
    dest: /etc/systemd/system/mayl-dashboard.service
    mode: '0644'

- name: Enable and start dashboard service
  systemd:
    name: mayl-dashboard
    enabled: yes
    state: restarted
    daemon_reload: yes
